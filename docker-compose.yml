# AI 爆款文章创作器 — Python 版 Docker Compose
# 用法：
#   1. cp .env.docker.example .env
#   2. 填写 DASHSCOPE_API_KEY、PEXELS_API_KEY
#   3. docker compose up -d --build
#   4. 访问 http://localhost

services:
  mysql:
    image: mysql:8.0
    container_name: ai-passage-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_passage_creator}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./python-backend/sql/create_table.sql:/docker-entrypoint-initdb.d/01_create_table.sql:ro
      - ./python-backend/sql/passage_table.sql:/docker-entrypoint-initdb.d/02_passage_table.sql:ro
      - ./python-backend/sql/migrate_article_agent_payment.sql:/docker-entrypoint-initdb.d/03_article_payment.sql:ro
      - ./python-backend/sql/migrate_article_content_longtext.sql:/docker-entrypoint-initdb.d/04_article_longtext.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD:-123456}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: ai-passage-redis
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
    image: ai-passage-python-backend:latest
    container_name: ai-passage-backend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SERVER_PORT: 8123
      SERVER_HOST: 0.0.0.0
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-ai_passage_creator}
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-change-me-in-production}
      SESSION_MAX_AGE: ${SESSION_MAX_AGE:-2592000}
      PASSWORD_SALT: ${PASSWORD_SALT:-yupi}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:?请在 .env 中设置 DASHSCOPE_API_KEY}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-plus}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost/vip?success=true}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost/vip?cancelled=true}
      NANO_BANANA_API_KEY: ${NANO_BANANA_API_KEY:-}
      NANO_BANANA_PROVIDER: ${NANO_BANANA_PROVIDER:-gemini}
      TENCENT_COS_SECRET_ID: ${TENCENT_COS_SECRET_ID:-}
      TENCENT_COS_SECRET_KEY: ${TENCENT_COS_SECRET_KEY:-}
      TENCENT_COS_REGION: ${TENCENT_COS_REGION:-}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET:-}
    ports:
      - '${BACKEND_PORT:-8123}:8123'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ai-passage-frontend:latest
    container_name: ai-passage-frontend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - '${FRONTEND_PORT:-80}:80'
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    name: ai-passage-network

volumes:
  mysql-data:
    name: ai-passage-mysql-data
  redis-data:
    name: ai-passage-redis-data
